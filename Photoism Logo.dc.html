<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    .lbl{font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:#9b958c;margin-bottom:13px;}
    .card{background:#fff;border-radius:3px;box-shadow:0 1px 3px rgba(0,0,0,.08),0 8px 26px rgba(43,39,36,.06);}
  </style>
</helmet>
<div style="width:max-content;min-width:100%;min-height:100vh;box-sizing:border-box;padding:56px;background:#e9e6e0;font-family:'Inter',sans-serif;">

  <div style="margin-bottom:42px;">
    <div style="font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.32em;text-transform:uppercase;color:#b07d5e;margin-bottom:10px;">Brand Identity</div>
    <div style="font-family:'Playfair Display',serif;font-size:30px;font-weight:600;color:#2b2724;">Photoism — Logo System</div>
  </div>

  <!-- ROW 1 -->
  <div style="display:flex;gap:32px;align-items:flex-start;margin-bottom:32px;">

    <!-- Primary vertical lockup -->
    <div style="flex:none;width:440px;">
      <div class="lbl">Primary Lockup</div>
      <div class="card" style="height:340px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;background:#faf7f1;">
        <div style="position:relative;width:78px;height:78px;">
          <div style="position:absolute;inset:0;border-radius:50%;border:3px solid #2b2724;"></div>
          <div style="position:absolute;inset:24%;border-radius:50%;background:#2b2724;"></div>
          <div style="position:absolute;top:30%;left:30%;width:13px;height:13px;border-radius:50%;background:#b07d5e;"></div>
        </div>
        <div style="text-align:center;line-height:1;">
          <div style="font-family:'Playfair Display',serif;font-size:46px;font-weight:600;color:#2b2724;letter-spacing:.01em;">Photoism</div>
          <div style="font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.42em;text-transform:uppercase;color:#a89f92;margin-top:13px;padding-left:.42em;">Photo Studio</div>
        </div>
      </div>
    </div>

    <!-- App icon -->
    <div style="flex:none;width:230px;">
      <div class="lbl">App Icon</div>
      <div class="card" style="height:340px;display:flex;align-items:center;justify-content:center;">
        <div style="width:150px;height:150px;border-radius:38px;background:linear-gradient(150deg,#3a332d,#211d19);display:flex;align-items:center;justify-content:center;box-shadow:0 18px 38px rgba(43,39,36,.32);">
          <div style="position:relative;width:74px;height:74px;">
            <div style="position:absolute;inset:0;border-radius:50%;border:3px solid #f3ede2;"></div>
            <div style="position:absolute;inset:24%;border-radius:50%;background:#f3ede2;"></div>
            <div style="position:absolute;top:30%;left:30%;width:12px;height:12px;border-radius:50%;background:#b07d5e;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Monogram -->
    <div style="flex:none;width:230px;">
      <div class="lbl">Monogram</div>
      <div class="card" style="height:340px;display:flex;align-items:center;justify-content:center;">
        <div style="position:relative;width:150px;height:150px;border-radius:50%;border:2px solid rgba(43,39,36,.12);display:flex;align-items:center;justify-content:center;">
          <span style="font-family:'Playfair Display',serif;font-size:78px;font-weight:600;color:#2b2724;line-height:1;">P</span>
          <div style="position:absolute;top:26px;right:30px;width:14px;height:14px;border-radius:50%;background:#b07d5e;"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ROW 2 -->
  <div style="display:flex;gap:32px;align-items:flex-start;">

    <!-- Horizontal lockup -->
    <div style="flex:none;width:472px;">
      <div class="lbl">Horizontal Lockup</div>
      <div class="card" style="height:200px;display:flex;align-items:center;justify-content:center;gap:20px;">
        <div style="position:relative;width:58px;height:58px;flex:none;">
          <div style="position:absolute;inset:0;border-radius:50%;border:2.5px solid #2b2724;"></div>
          <div style="position:absolute;inset:24%;border-radius:50%;background:#2b2724;"></div>
          <div style="position:absolute;top:30%;left:30%;width:10px;height:10px;border-radius:50%;background:#b07d5e;"></div>
        </div>
        <div style="line-height:1;">
          <div style="font-family:'Playfair Display',serif;font-size:38px;font-weight:600;color:#2b2724;">Photoism</div>
          <div style="font-family:'Inter',sans-serif;font-size:9.5px;font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:#a89f92;margin-top:8px;padding-left:.34em;">Photo Studio</div>
        </div>
      </div>
    </div>

    <!-- Dark / reversed -->
    <div style="flex:none;width:368px;">
      <div class="lbl">Reversed</div>
      <div class="card" style="height:200px;display:flex;align-items:center;justify-content:center;gap:18px;background:#211d19;">
        <div style="position:relative;width:54px;height:54px;flex:none;">
          <div style="position:absolute;inset:0;border-radius:50%;border:2.5px solid #f3ede2;"></div>
          <div style="position:absolute;inset:24%;border-radius:50%;background:#f3ede2;"></div>
          <div style="position:absolute;top:30%;left:30%;width:9px;height:9px;border-radius:50%;background:#cf9b76;"></div>
        </div>
        <div style="line-height:1;">
          <div style="font-family:'Playfair Display',serif;font-size:34px;font-weight:600;color:#f6f1e9;">Photoism</div>
          <div style="font-family:'Inter',sans-serif;font-size:9px;font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:#9a9086;margin-top:8px;padding-left:.34em;">Photo Studio</div>
        </div>
      </div>
    </div>

    <!-- Palette -->
    <div style="flex:none;width:230px;">
      <div class="lbl">Palette</div>
      <div class="card" style="height:200px;padding:22px;display:flex;flex-direction:column;justify-content:center;gap:14px;">
        <div style="display:flex;align-items:center;gap:12px;"><div style="width:34px;height:34px;border-radius:9px;background:#2b2724;flex:none;"></div><div style="line-height:1.3;"><div style="font-size:12.5px;font-weight:700;color:#2b2724;">Espresso</div><div style="font-size:11px;color:#9b958c;font-family:'Inter',sans-serif;">#2B2724</div></div></div>
        <div style="display:flex;align-items:center;gap:12px;"><div style="width:34px;height:34px;border-radius:9px;background:#b07d5e;flex:none;"></div><div style="line-height:1.3;"><div style="font-size:12.5px;font-weight:700;color:#2b2724;">Terracotta</div><div style="font-size:11px;color:#9b958c;font-family:'Inter',sans-serif;">#B07D5E</div></div></div>
        <div style="display:flex;align-items:center;gap:12px;"><div style="width:34px;height:34px;border-radius:9px;background:#f3ede2;border:1px solid rgba(43,39,36,.08);flex:none;"></div><div style="line-height:1.3;"><div style="font-size:12.5px;font-weight:700;color:#2b2724;">Cream</div><div style="font-size:11px;color:#9b958c;font-family:'Inter',sans-serif;">#F3EDE2</div></div></div>
      </div>
    </div>

  </div>

</div>
</x-dc>
</body>
</html>
